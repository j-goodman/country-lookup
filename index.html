<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Lookup</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <input type="text">
    <section class="country-info">
        <h1 id="country-name">Canada</h1>
        <img id="country-flag" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Flag_of_Canada_%28Pantone%29.svg/3840px-Flag_of_Canada_%28Pantone%29.svg.png" alt="The flag of Canada">
        <p id="country-description">Canada is a country in North America with a population of 41,575,585</p>
    </section>
</body>
</html>
