<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Lookup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="earth.png" type="image/png">
    <script defer src="script.js"></script>
</head>
<body>
    <input id="input-box" type="text" placeholder="Type a country here and press enter.">
    <section class="country-info">
        <h1 id="country-name"></h1>
        <img id="country-flag" src="" alt="">
        <p id="country-description"></p>
    </section>
</body>
</html>
